<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingspartner">
<meta name="theme-color" content="#14171c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<title>Trainingspartner</title>
<style>
  :root {
    --bg: #14171c;
    --panel: #1a1d23;
    --panel-alt: #1f232b;
    --border: #3a3f47;
    --text: #f2f2f2;
    --muted: #9aa0a8;
    --muted2: #6b7077;
    --accent: #7fdba8;
  }
  body.light {
    --bg: #f4f6f5;
    --panel: #ffffff;
    --panel-alt: #eef1ef;
    --border: #d8dedb;
    --text: #1a1d23;
    --muted: #5b6560;
    --muted2: #7a827d;
    --accent: #2e7d4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
  }
  .card { text-align: center; padding: 30px 26px; width: min(90vw, 380px); position: relative; }

  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; min-height: 22px;
  }
  .streak { font-size: 0.85rem; color: var(--muted); }
  .theme-toggle {
    background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px;
  }

  .ring-wrap {
    position: relative; width: 230px; height: 230px; margin: 6px auto 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .progress-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); z-index: 2; }
  .ring-bg { fill: none; stroke: var(--panel-alt); stroke-width: 10; }
  .ring-fill {
    fill: none; stroke: #7fdba8; stroke-width: 10; stroke-linecap: round;
    transition: stroke-dashoffset 0.2s linear, stroke 0.4s ease;
  }
  .breathing-circle {
    position: absolute; top: 50%; left: 50%; width: 170px; height: 170px; margin: -85px 0 0 -85px;
    border-radius: 50%; background: radial-gradient(circle, rgba(127,219,168,0.35), rgba(127,219,168,0) 70%);
    opacity: 0; z-index: 1; pointer-events: none;
  }
  .breathing-circle.active { animation: breathe 8s ease-in-out; }
  @keyframes breathe {
    0% { transform: scale(0.8); opacity: 0; }
    15% { opacity: 0.6; }
    50% { transform: scale(1.18); opacity: 0.45; }
    85% { opacity: 0.25; }
    100% { transform: scale(0.8); opacity: 0; }
  }
  .time {
    position: relative; z-index: 3; font-size: 2.9rem; font-weight: 700;
    font-variant-numeric: tabular-nums; color: #7fdba8; transition: color 0.4s ease;
  }
  .phase-label {
    position: relative; z-index: 3; margin-top: 2px; font-size: 0.85rem; color: var(--muted); min-height: 1.2em;
  }

  .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  button {
    font-size: 1rem; padding: 13px 18px; border-radius: 12px; border: none;
    cursor: pointer; font-weight: 600; transition: transform 0.1s ease;
  }
  button:active { transform: scale(0.96); }
  #startBtn { background: #2e7d4f; color: white; }
  #stopBtn { background: #b3413a; color: white; }
  #resetBtn { background: var(--border); color: var(--text); }
  #muteBtn { background: var(--border); color: var(--text); padding: 13px 15px; font-size: 1.1rem; }
  #voiceBtn { background: var(--border); color: var(--text); padding: 13px 15px; font-size: 1.1rem; }
  #voiceBtn.listening { background: #2e7d4f; color: white; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .mode-row { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
  .mode-btn {
    flex: 1; background: var(--panel-alt); color: var(--muted); font-size: 0.85rem;
    padding: 9px; border: 1px solid var(--border);
  }
  .mode-btn.active { background: #2e7d4f; color: white; border-color: #2e7d4f; }

  .ex-picker {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-top: 16px; font-size: 0.95rem; color: var(--text);
  }
  .chev {
    background: var(--panel-alt); color: var(--text); border: 1px solid var(--border);
    width: 34px; height: 34px; padding: 0; border-radius: 8px; font-size: 1.1rem; line-height: 1;
  }
  .ex-name { min-width: 130px; font-weight: 600; }

  .settings {
    margin-top: 14px; font-size: 0.9rem; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  select {
    background: var(--panel-alt); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px;
  }
  .record-line { margin-top: 10px; font-size: 0.85rem; color: var(--accent); min-height: 1.2em; }
  .status { margin-top: 12px; font-size: 0.85rem; color: var(--muted2); min-height: 1.2em; }

  .small-btn {
    background: var(--panel-alt); color: var(--muted); font-size: 0.8rem;
    padding: 8px 14px; border: 1px solid var(--border);
  }
  .history { margin-top: 14px; text-align: left; background: var(--panel); border-radius: 12px; padding: 12px 16px; font-size: 0.85rem; }
  .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--panel-alt); color: var(--text); }
  .history-item:last-child { border-bottom: none; }
  .history-empty { color: var(--muted2); padding: 4px 0; }

  .flash-overlay {
    position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none;
    z-index: 50; transition: opacity 0.15s ease;
  }
  .flash-overlay.active { opacity: 0.22; }

  .top-row .icon-group { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px; }
  .today-line { font-size: 0.78rem; color: var(--muted2); margin-top: 2px; }

  .settings-panel {
    display: none; text-align: left; background: var(--panel); border-radius: 12px;
    padding: 14px 16px; margin-top: 14px; font-size: 0.85rem;
  }
  .settings-panel label { display: block; color: var(--muted); margin-bottom: 6px; }
  .settings-panel input[type="text"] {
    width: 100%; background: var(--panel-alt); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 0.9rem; margin-bottom: 14px;
  }
  .swatch-row { display: flex; gap: 10px; }
  .swatch {
    width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; padding: 0;
  }
  .swatch.selected { border-color: var(--text); }

  .heatmap { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; margin-bottom: 12px; }
  .heatmap-cell { aspect-ratio: 1; border-radius: 3px; background: var(--panel-alt); }

  /* Gym mode: hide everything except the giant timer */
  body.gym-mode .top-row, body.gym-mode .controls, body.gym-mode .mode-row,
  body.gym-mode .ex-picker, body.gym-mode .settings, body.gym-mode #intervalSettings,
  body.gym-mode .record-line, body.gym-mode .status, body.gym-mode .settings-panel,
  body.gym-mode #historySection,
  body.gym-mode .controls + .controls { display: none !important; }
  body.gym-mode .ring-wrap { width: 90vw; height: 90vw; max-width: 420px; max-height: 420px; }
  body.gym-mode .time { font-size: 5rem; }
  body.gym-mode .card { width: 100vw; }

  .confetti-piece {
    position: fixed; top: -20px; width: 8px; height: 14px; z-index: 60; pointer-events: none;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(540deg); opacity: 0.2; }
  }

  .splash {
    position: fixed; inset: 0; z-index: 100; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-icon-wrap {
    position: relative; width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
    animation: splash-pop 0.7s cubic-bezier(.34,1.56,.64,1) both,
               splash-pulse 2.2s ease-in-out 0.7s infinite,
               splash-icon-move 1.8s ease-in-out 0.7s infinite;
  }
  .splash-glow {
    position: absolute; inset: -30px; border-radius: 50%;
    background: radial-gradient(circle, rgba(127,219,168,0.35), rgba(127,219,168,0) 70%);
    animation: splash-glow-pulse 2.2s ease-in-out 0.7s infinite;
  }
  .splash-icon { position: relative; width: 100px; height: 100px; border-radius: 24px; display: block; z-index: 2; }
  .splash-ring {
    position: absolute; inset: -14px; border-radius: 50%;
    border: 3px solid transparent; border-top-color: var(--accent); border-right-color: var(--accent);
    opacity: 0.55; animation: splash-spin 3s linear infinite;
  }
  .splash-ring-outer {
    position: absolute; inset: -30px; border-radius: 50%;
    border: 2px solid transparent; border-bottom-color: var(--accent); border-left-color: var(--accent);
    opacity: 0.3; animation: splash-spin-reverse 5s linear infinite;
  }
  @keyframes splash-pop {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes splash-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
  @keyframes splash-icon-move {
    0%, 100% { translate: 0 0; rotate: -5deg; }
    50% { translate: 0 -8px; rotate: 5deg; }
  }
  @keyframes splash-glow-pulse { 0%, 100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes splash-spin { to { transform: rotate(360deg); } }
  @keyframes splash-spin-reverse { to { transform: rotate(-360deg); } }

  .splash-wave { display: flex; align-items: flex-end; gap: 5px; height: 20px; margin-top: 22px; }
  .splash-wave span {
    display: block; width: 5px; border-radius: 3px; background: var(--accent);
    animation: splash-wave-bounce 1s ease-in-out infinite;
  }
  .splash-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .splash-wave span:nth-child(2) { height: 16px; animation-delay: 0.12s; }
  .splash-wave span:nth-child(3) { height: 20px; animation-delay: 0.24s; }
  .splash-wave span:nth-child(4) { height: 14px; animation-delay: 0.36s; }
  .splash-wave span:nth-child(5) { height: 8px; animation-delay: 0.48s; }
  @keyframes splash-wave-bounce {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .splash-title {
    margin-top: 18px; font-size: 1.3rem; font-weight: 700; color: var(--text);
    opacity: 0; transform: translateY(10px);
    animation: splash-fade-up 0.6s ease 0.5s forwards;
  }
  .splash-sub {
    margin-top: 6px; font-size: 0.9rem; color: var(--muted);
    opacity: 0; transform: translateY(10px);
    animation: splash-fade-up 0.6s ease 0.7s forwards;
  }
  @keyframes splash-fade-up { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="splash" id="splashScreen">
    <div class="splash-icon-wrap">
      <div class="splash-glow"></div>
      <div class="splash-ring-outer"></div>
      <div class="splash-ring"></div>
      <img src="icon-512.png" alt="" class="splash-icon">
    </div>
    <div class="splash-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="splash-title" id="splashTitle">Trainingspartner</div>
    <div class="splash-sub" id="splashSub"></div>
  </div>
  <div class="flash-overlay" id="flashOverlay"></div>
  <div class="card">
    <div class="top-row">
      <div>
        <div class="streak" id="streakDisplay"></div>
        <div class="today-line" id="todayDisplay"></div>
      </div>
      <div class="icon-group">
        <button class="icon-btn" id="settingsBtn" aria-label="Instellingen">⚙️</button>
        <button class="icon-btn" id="gymBtn" aria-label="Gym-modus">⛶</button>
        <button class="theme-toggle" id="themeBtn" aria-label="Thema wisselen">🌙</button>
      </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <label for="nameInput">Jouw naam (voor persoonlijke aanmoedigingen)</label>
      <input type="text" id="nameInput" placeholder="bijv. Ids">
      <label>Accentkleur</label>
      <div class="swatch-row">
        <button class="swatch selected" data-color="127,219,168" style="background:#7fdba8"></button>
        <button class="swatch" data-color="94,158,219" style="background:#5e9edb"></button>
        <button class="swatch" data-color="176,141,255" style="background:#b08dff"></button>
        <button class="swatch" data-color="255,111,97" style="background:#ff6f61"></button>
        <button class="swatch" data-color="255,184,92" style="background:#ffb85c"></button>
      </div>
    </div>

    <div class="ring-wrap" id="ringWrap">
      <svg class="progress-ring" viewBox="0 0 230 230">
        <circle class="ring-bg" cx="115" cy="115" r="100"></circle>
        <circle class="ring-fill" id="ringFill" cx="115" cy="115" r="100"></circle>
      </svg>
      <div class="breathing-circle" id="breathingCircle"></div>
      <div>
        <div class="time" id="display">0:00</div>
        <div class="phase-label" id="phaseLabel"></div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="resetBtn">Reset</button>
      <button id="muteBtn" aria-label="Geluid aan/uit">🔊</button>
      <button id="voiceBtn" aria-label="Stembediening" style="display:none;">🎤</button>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" id="freeModeBtn">Vrije hold</button>
      <button class="mode-btn" id="intervalModeBtn">Intervallen</button>
    </div>

    <div class="ex-picker">
      <button class="chev" id="exPrev">‹</button>
      <div class="ex-name" id="exName">Plank</div>
      <button class="chev" id="exNext">›</button>
    </div>

    <div class="settings" id="freeSettings">
      Meld elke
      <select id="interval">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="30">30</option>
      </select>
      seconden
    </div>

    <div id="intervalSettings" style="display:none;">
      <div class="settings">
        Werk <select id="workSec">
          <option value="15">15s</option>
          <option value="20">20s</option>
          <option value="30" selected>30s</option>
          <option value="45">45s</option>
          <option value="60">60s</option>
        </select>
        Rust <select id="restSec">
          <option value="10">10s</option>
          <option value="15" selected>15s</option>
          <option value="20">20s</option>
          <option value="30">30s</option>
        </select>
        Rondes <select id="rounds">
          <option value="1">1</option><option value="2">2</option>
          <option value="3" selected>3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="8">8</option><option value="10">10</option>
        </select>
      </div>
    </div>

    <div class="record-line" id="recordDisplay">Record: --</div>
    <div class="status" id="status">Stem laden...</div>
    <div class="controls" style="margin-top: 10px;">
      <button class="small-btn" id="shareBtn" style="display:none;">Deel record</button>
    </div>

    <div class="controls" style="margin-top: 10px;">
      <button class="small-btn" id="historyToggle">Statistieken</button>
    </div>
    <div class="history" id="historySection" style="display:none;">
      <div class="heatmap" id="heatmap"></div>
      <div id="historyList" class="history-empty">Nog geen sessies</div>
    </div>
  </div>

  <div id="confettiContainer"></div>

<script>
  // ====== CONFIG ======
  const ELEVEN_API_KEY = 'REDACTED_ELEVENLABS_KEY';
  const ELEVEN_MODEL = 'eleven_turbo_v2_5';
  // Leave empty to auto-pick the first voice in your account. Fill in a specific
  // ElevenLabs voice_id (from the Voice Library) to always use that exact voice.
  const FIXED_VOICE_ID = '';
  const EX_KEYS = ['plank', 'deadhang', 'lsit'];
  const EX_NAMES = { plank: 'Plank', deadhang: 'Deadhang', lsit: 'L-sit deadhang' };

  // ====== Shared state ======
  let exerciseIndex = 0;
  let isMuted = false;
  let wakeLock = null;
  let intervalMode = false;
  let timerId = null;
  let elapsed = 0; // free-hold mode elapsed seconds

  const BREATHING_CUE = 'Rustig doorademen.';
  const encouragementsByExercise = {
    plank: [
      'Hou je rug mooi recht!',
      'Laat je heupen niet zakken!',
      'Span je buikspieren aan, jij kan dit!',
      BREATHING_CUE,
      'Nek ontspannen, kijk naar de grond.'
    ],
    deadhang: [
      'Schouders actief, niet helemaal hangen!',
      'Grip vasthouden, je doet het goed!',
      BREATHING_CUE,
      'Nek lekker los laten hangen.',
      'Kom op, nog even volhouden!'
    ],
    lsit: [
      'Houd die benen mooi hoog!',
      'Knieën strak, tenen gespannen!',
      'Core aanspannen, je zit er goed bij!',
      'Schouders naar beneden, weg bij je oren.',
      'Sterk blijven, nog even!'
    ]
  };

  function currentEx() { return EX_KEYS[exerciseIndex]; }

  // ====== Elements ======
  const display = document.getElementById('display');
  const phaseLabel = document.getElementById('phaseLabel');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');
  const muteBtn = document.getElementById('muteBtn');
  const themeBtn = document.getElementById('themeBtn');
  const intervalSelect = document.getElementById('interval');
  const exName = document.getElementById('exName');
  const exPrev = document.getElementById('exPrev');
  const exNext = document.getElementById('exNext');
  const status = document.getElementById('status');
  const ringFill = document.getElementById('ringFill');
  const breathingCircle = document.getElementById('breathingCircle');
  const recordDisplay = document.getElementById('recordDisplay');
  const historyToggle = document.getElementById('historyToggle');
  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');
  const streakDisplay = document.getElementById('streakDisplay');
  const shareBtn = document.getElementById('shareBtn');
  const flashOverlay = document.getElementById('flashOverlay');
  const freeModeBtn = document.getElementById('freeModeBtn');
  const intervalModeBtn = document.getElementById('intervalModeBtn');
  const freeSettings = document.getElementById('freeSettings');
  const intervalSettings = document.getElementById('intervalSettings');
  const workSecSelect = document.getElementById('workSec');
  const restSecSelect = document.getElementById('restSec');
  const roundsSelect = document.getElementById('rounds');
  const todayDisplay = document.getElementById('todayDisplay');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const nameInput = document.getElementById('nameInput');
  const swatches = document.querySelectorAll('.swatch');
  const gymBtn = document.getElementById('gymBtn');
  const ringWrap = document.getElementById('ringWrap');
  const heatmapEl = document.getElementById('heatmap');
  const confettiContainer = document.getElementById('confettiContainer');

  // ====== Ring ======
  const RING_R = 100;
  const RING_CIRC = 2 * Math.PI * RING_R;
  ringFill.style.strokeDasharray = RING_CIRC;
  ringFill.style.strokeDashoffset = RING_CIRC;

  // ====== Accent color ======
  let accentRGB = [127, 219, 168];
  function applyAccentCSS() {
    const [r, g, b] = accentRGB;
    document.documentElement.style.setProperty('--accent', `rgb(${r},${g},${b})`);
  }
  (() => {
    try {
      const saved = localStorage.getItem('accentColor');
      if (saved) {
        accentRGB = saved.split(',').map(Number);
        swatches.forEach(sw => sw.classList.toggle('selected', sw.dataset.color === saved));
      }
    } catch (e) {}
    applyAccentCSS();
  })();
  swatches.forEach(sw => {
    sw.addEventListener('click', () => {
      accentRGB = sw.dataset.color.split(',').map(Number);
      swatches.forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      applyAccentCSS();
      try { localStorage.setItem('accentColor', sw.dataset.color); } catch (e) {}
      if (!timerId) resetRing();
    });
  });

  // ====== Personalized name ======
  let userName = '';
  (() => {
    try { userName = localStorage.getItem('userName') || ''; } catch (e) {}
    nameInput.value = userName;
  })();
  nameInput.addEventListener('input', () => {
    userName = nameInput.value.trim();
    try { localStorage.setItem('userName', userName); } catch (e) {}
  });
  function withName(text) { return userName ? text + ' ' + userName : text; }

  settingsBtn.addEventListener('click', () => {
    settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
  });

  // ====== Gym mode (big-screen focus view) ======
  gymBtn.addEventListener('click', () => document.body.classList.add('gym-mode'));
  ringWrap.addEventListener('click', () => {
    if (document.body.classList.contains('gym-mode')) document.body.classList.remove('gym-mode');
  });

  function colorForElapsed(sec) {
    const t = Math.min(sec / 180, 1);
    const c1 = accentRGB, c2 = [255, 159, 92];
    const r = Math.round(c1[0] + (c2[0]-c1[0])*t);
    const g = Math.round(c1[1] + (c2[1]-c1[1])*t);
    const b = Math.round(c1[2] + (c2[2]-c1[2])*t);
    return `rgb(${r},${g},${b})`;
  }
  function setRingFraction(fraction, color) {
    ringFill.style.strokeDashoffset = RING_CIRC * (1 - fraction);
    ringFill.style.stroke = color;
    display.style.color = color;
  }
  function resetRing() { setRingFraction(0, `rgb(${accentRGB.join(',')})`); }

  function triggerBreathing() {
    breathingCircle.classList.remove('active');
    void breathingCircle.offsetWidth;
    breathingCircle.classList.add('active');
  }

  function flashScreen() {
    flashOverlay.classList.add('active');
    setTimeout(() => flashOverlay.classList.remove('active'), 150);
  }
  function vibrate(pattern) {
    if ('vibrate' in navigator) { try { navigator.vibrate(pattern); } catch (e) {} }
  }
  function pulseFeedback(pattern) {
    vibrate(pattern);
    flashScreen();
  }

  // ====== Numbers to Dutch words ======
  function numberToDutchWords(n) {
    const ones = ['nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen',
                  'tien','elf','twaalf','dertien','veertien','vijftien','zestien',
                  'zeventien','achttien','negentien'];
    const tens = ['', '', 'twintig', 'dertig', 'veertig', 'vijftig', 'zestig', 'zeventig', 'tachtig', 'negentig'];
    if (n < 20) return ones[n];
    if (n < 100) {
      const t = Math.floor(n / 10), o = n % 10;
      return o === 0 ? tens[t] : ones[o] + 'en' + tens[t];
    }
    const h = Math.floor(n / 100), rest = n % 100;
    return (h > 1 ? ones[h] + 'honderd' : 'honderd') + (rest ? numberToDutchWords(rest) : '');
  }

  // ====== Mobile audio unlock ======
  const audioPlayer = new Audio();
  const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  async function unlockAudio() {
    audioPlayer.src = SILENT_WAV;
    audioPlayer.play().catch(() => {});
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    }
    const ctx = getAudioCtx();
    if (ctx && ctx.state === 'suspended') {
      try { await ctx.resume(); } catch (e) {}
    }
  }

  // ====== Sound design (synthesized locally, no extra assets or quota) ======
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    return audioCtx;
  }
  function playTone(freq, duration = 0.12, type = 'sine', volume = 0.16, startDelay = 0) {
    const ctx = getAudioCtx();
    if (!ctx || ctx.state !== 'running') return;
    const t0 = ctx.currentTime + startDelay;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(volume, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }
  function playChime(freqs, gap = 0.1) {
    freqs.forEach((f, i) => playTone(f, 0.18, 'sine', 0.18, i * gap));
  }
  function playTick() { playTone(1000, 0.05, 'square', 0.08); }
  function playMilestoneChime() { playChime([659.25, 880]); }
  function playRecordFanfare() { playChime([523.25, 659.25, 783.99, 1046.5], 0.09); }

  // ====== Wake lock ======
  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
    catch (e) {}
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !stopBtn.disabled) requestWakeLock();
  });

  // ====== Theme ======
  async function applyTheme(mode, persist) {
    document.body.classList.toggle('light', mode === 'light');
    themeBtn.textContent = mode === 'light' ? '🌙' : '☀️';
    if (persist) { try { localStorage.setItem('theme', mode); } catch (e) {} }
  }
  themeBtn.addEventListener('click', () => {
    const next = document.body.classList.contains('light') ? 'dark' : 'light';
    applyTheme(next, true);
  });
  (() => {
    try {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') applyTheme('light', false);
    } catch (e) {}
  })();

  // ====== Records, history, streak ======
  async function getRecord(ex) {
    try { const v = localStorage.getItem('record:' + ex); return v ? parseInt(v, 10) : 0; }
    catch (e) { return 0; }
  }
  async function setRecord(ex, seconds) {
    try { localStorage.setItem('record:' + ex, String(seconds)); } catch (e) {}
  }
  async function updateRecordDisplay() {
    if (intervalMode) { recordDisplay.textContent = ''; return; }
    const rec = await getRecord(currentEx());
    recordDisplay.textContent = rec > 0 ? 'Record: ' + format(rec) : 'Nog geen record';
  }
  async function loadSessions() {
    try { const v = localStorage.getItem('sessions'); return v ? JSON.parse(v) : []; }
    catch (e) { return []; }
  }
  async function saveSession(ex, dur) {
    try {
      const list = await loadSessions();
      list.unshift({ ex, dur, ts: Date.now() });
      const trimmed = list.slice(0, 30);
      localStorage.setItem('sessions', JSON.stringify(trimmed));
      renderHistory(trimmed);
      updateTodayOverview(trimmed);
      renderHeatmap(trimmed);
      updateStreak(trimmed);
    } catch (e) {}
  }
  function renderHistory(list) {
    if (!list.length) { historyList.innerHTML = '<div class="history-empty">Nog geen sessies</div>'; return; }
    historyList.innerHTML = list.slice(0, 6).map(s => {
      const d = new Date(s.ts);
      const dateStr = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
      return `<div class="history-item"><span>${EX_NAMES[s.ex] || s.ex}</span><span>${format(s.dur)} · ${dateStr}</span></div>`;
    }).join('');
  }
  function updateTodayOverview(list) {
    const todayStr = new Date().toDateString();
    const todays = list.filter(s => new Date(s.ts).toDateString() === todayStr);
    if (!todays.length) { todayDisplay.textContent = ''; return; }
    const total = todays.reduce((sum, s) => sum + s.dur, 0);
    todayDisplay.textContent = `Vandaag: ${todays.length} ${todays.length === 1 ? 'sessie' : 'sessies'}, ${format(total)} totaal`;
  }

  function renderHeatmap(list) {
    const days = 84; // 12 weeks
    const totals = {};
    list.forEach(s => {
      const key = new Date(s.ts).toDateString();
      totals[key] = (totals[key] || 0) + s.dur;
    });
    let cellsHtml = '';
    const today = new Date();
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dur = totals[d.toDateString()] || 0;
      let bg = 'var(--panel-alt)';
      if (dur > 0) {
        const level = Math.min(Math.floor(dur / 30) + 1, 4); // 4 intensity steps
        const alpha = 0.25 + level * 0.18;
        bg = `rgba(${accentRGB.join(',')},${alpha})`;
      }
      cellsHtml += `<div class="heatmap-cell" style="background:${bg}" title="${d.toLocaleDateString('nl-NL')}"></div>`;
    }
    heatmapEl.innerHTML = cellsHtml;
  }

  function updateStreak(list) {
    const days = new Set(list.map(s => new Date(s.ts).toDateString()));
    let streak = 0;
    const cursor = new Date();
    if (!days.has(cursor.toDateString())) cursor.setDate(cursor.getDate() - 1);
    while (days.has(cursor.toDateString())) { streak++; cursor.setDate(cursor.getDate() - 1); }
    streakDisplay.textContent = streak > 0 ? '🔥 ' + streak + (streak === 1 ? ' dag op rij' : ' dagen op rij') : '';
  }

  // Converts a duration in seconds to a natural spoken Dutch phrase, e.g.
  // "een minuut en vijftien seconden" — used for the end-of-session summary.
  function spokenDuration(sec) {
    if (sec < 60) return numberToDutchWords(sec) + ' seconden';
    const m = Math.floor(sec / 60), s = sec % 60;
    let out = numberToDutchWords(m) + (m === 1 ? ' minuut' : ' minuten');
    if (s > 0) out += ' en ' + numberToDutchWords(s) + ' seconden';
    return out;
  }

  let lastRecordEx = null, lastRecordDur = 0;
  function spawnConfetti() {
    const colors = ['#7fdba8', '#5e9edb', '#b08dff', '#ff6f61', '#ffb85c'];
    for (let i = 0; i < 28; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (1.6 + Math.random() * 1.2) + 's';
      piece.style.opacity = String(0.7 + Math.random() * 0.3);
      confettiContainer.appendChild(piece);
      setTimeout(() => piece.remove(), 3000);
    }
  }

  async function checkRecord(ex, dur) {
    const rec = await getRecord(ex);
    let isNewRecord = false, improvement = 0;
    if (dur > rec) {
      await setRecord(ex, dur);
      isNewRecord = true;
      improvement = rec > 0 ? dur - rec : 0;
      status.textContent = 'Nieuw record! 🎉 ' + format(dur);
      pulseFeedback([100, 60, 100, 60, 200]);
      playRecordFanfare();
      spawnConfetti();
      lastRecordEx = ex; lastRecordDur = dur;
      shareBtn.style.display = 'inline-block';
    }
    updateRecordDisplay();
    return { isNewRecord, improvement };
  }

  // ---- Share record as an image ----
  function generateShareCanvas(ex, dur) {
    const canvas = document.createElement('canvas');
    canvas.width = 800; canvas.height = 800;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#14171c'; ctx.fillRect(0, 0, 800, 800);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9aa0a8';
    ctx.font = '36px -apple-system, sans-serif';
    ctx.fillText('Nieuw record 🎉', 400, 300);
    ctx.fillStyle = '#7fdba8';
    ctx.font = 'bold 130px -apple-system, sans-serif';
    ctx.fillText(format(dur), 400, 440);
    ctx.fillStyle = '#f2f2f2';
    ctx.font = 'bold 44px -apple-system, sans-serif';
    ctx.fillText(EX_NAMES[ex] || ex, 400, 520);
    return canvas;
  }
  shareBtn.addEventListener('click', () => {
    if (!lastRecordEx) return;
    const canvas = generateShareCanvas(lastRecordEx, lastRecordDur);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'record.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'Nieuw record!', text: EX_NAMES[lastRecordEx] + ': ' + format(lastRecordDur) }); }
        catch (e) {}
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'record.png'; a.click();
      }
    });
  });

  historyToggle.addEventListener('click', () => {
    const showing = historySection.style.display !== 'none';
    historySection.style.display = showing ? 'none' : 'block';
    historyToggle.textContent = showing ? 'Statistieken' : 'Verberg statistieken';
  });

  // ====== Exercise picker (swipe + chevrons) ======
  function renderExName() { exName.textContent = EX_NAMES[currentEx()]; }
  function changeExercise(delta) {
    if (!startBtn.disabled === false && timerId) return; // no-op guard, real lock handled by disabling below
    exerciseIndex = (exerciseIndex + delta + EX_KEYS.length) % EX_KEYS.length;
    renderExName();
    updateRecordDisplay();
    shareBtn.style.display = 'none';
  }
  exPrev.addEventListener('click', () => changeExercise(-1));
  exNext.addEventListener('click', () => changeExercise(1));

  let touchStartX = null;
  const exPickerEl = document.querySelector('.ex-picker');
  exPickerEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  exPickerEl.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) changeExercise(dx > 0 ? -1 : 1);
    touchStartX = null;
  }, { passive: true });

  // ====== Voice control ("stop" to stop the timer hands-free) ======
  // Not supported in iOS Safari — the button simply stays hidden there.
  // The mic button only toggles a saved preference; actual listening starts
  // and stops automatically with the timer, since your hands are busy mid-hold.
  const voiceBtn = document.getElementById('voiceBtn');
  const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let voiceControlEnabled = false;
  let isListeningSession = false;
  if (SRClass) {
    voiceBtn.style.display = 'inline-block';
    try { voiceControlEnabled = localStorage.getItem('voiceControlEnabled') === 'true'; } catch (e) {}
    voiceBtn.classList.toggle('listening', voiceControlEnabled);
    recognition = new SRClass();
    recognition.lang = 'nl-NL';
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
      if (transcript.includes('stop') && !stopBtn.disabled) stopBtn.click();
    };
    recognition.onerror = () => {};
    recognition.onend = () => { if (isListeningSession) { try { recognition.start(); } catch (e) {} } };
    voiceBtn.addEventListener('click', () => {
      voiceControlEnabled = !voiceControlEnabled;
      voiceBtn.classList.toggle('listening', voiceControlEnabled);
      try { localStorage.setItem('voiceControlEnabled', String(voiceControlEnabled)); } catch (e) {}
    });
  }
  function startVoiceListening() {
    if (SRClass && voiceControlEnabled) { isListeningSession = true; try { recognition.start(); } catch (e) {} }
  }
  function stopVoiceListening() {
    isListeningSession = false;
    if (SRClass) { try { recognition.stop(); } catch (e) {} }
  }

  // ====== Mute ======
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    muteBtn.textContent = isMuted ? '🔇' : '🔊';
    if (isMuted) { window.speechSynthesis.cancel(); audioPlayer.pause(); }
  });

  // ====== ElevenLabs ======
  let elevenVoiceId = null;
  let elevenReady = false;
  async function initEleven() {
    if (FIXED_VOICE_ID) {
      elevenVoiceId = FIXED_VOICE_ID;
      elevenReady = true;
      status.textContent = '';
      return;
    }
    try {
      const res = await fetch('https://api.elevenlabs.io/v1/voices', { headers: { 'xi-api-key': ELEVEN_API_KEY } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.voices && data.voices.length) {
        elevenVoiceId = data.voices[0].voice_id;
        elevenReady = true;
        status.textContent = '';
      } else throw new Error('Geen stemmen gevonden');
    } catch (e) {
      elevenReady = false;
      status.textContent = 'ElevenLabs fout: ' + (e && e.message ? e.message : e);
    }
  }
  initEleven();

  // ---- Audio cache: repeated phrases (numbers, cues) are reused instead of
  // re-generated every time. More stable (no risk of a fresh glitch on a phrase
  // that already sounded fine) and saves ElevenLabs credits.
  const TTS_CACHE_NAME = 'tts-cache-v1';
  async function getCachedAudio(text) {
    try {
      const cache = await caches.open(TTS_CACHE_NAME);
      const match = await cache.match('/tts/' + encodeURIComponent(elevenVoiceId + ':' + text));
      if (match) return URL.createObjectURL(await match.blob());
    } catch (e) {}
    return null;
  }
  async function putCachedAudio(text, blob) {
    try {
      const cache = await caches.open(TTS_CACHE_NAME);
      await cache.put('/tts/' + encodeURIComponent(elevenVoiceId + ':' + text), new Response(blob, { headers: { 'Content-Type': 'audio/mpeg' } }));
    } catch (e) {}
  }

  async function speakEleven(text) {
    const cachedUrl = await getCachedAudio(text);
    if (cachedUrl) {
      audioPlayer.src = cachedUrl;
      await audioPlayer.play();
      return;
    }
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + elevenVoiceId, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVEN_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text, model_id: ELEVEN_MODEL, language_code: 'nl',
        voice_settings: { stability: 0.88, similarity_boost: 0.75, style: 0.2, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    audioPlayer.src = URL.createObjectURL(blob);
    putCachedAudio(text, blob);
    await audioPlayer.play();
  }
  function speakBrowser(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'nl-NL'; u.rate = 1;
    window.speechSynthesis.speak(u);
  }
  async function speak(text) {
    if (isMuted) return;
    if (elevenReady) {
      try { await speakEleven(text); return; } catch (e) {}
    }
    speakBrowser(text);
  }

  function format(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  // ====== Mode switching ======
  function setMode(mode) {
    if (timerId) return; // don't allow switching mid-run
    intervalMode = mode === 'interval';
    freeModeBtn.classList.toggle('active', !intervalMode);
    intervalModeBtn.classList.toggle('active', intervalMode);
    freeSettings.style.display = intervalMode ? 'none' : 'flex';
    intervalSettings.style.display = intervalMode ? 'block' : 'none';
    phaseLabel.textContent = '';
    display.textContent = '0:00';
    resetRing();
    updateRecordDisplay();
    status.textContent = '';
  }
  freeModeBtn.addEventListener('click', () => setMode('free'));
  intervalModeBtn.addEventListener('click', () => setMode('interval'));

  // ====== FREE HOLD MODE ======
  let startTime = null;
  let lastAnnounced = 0;
  let lastCueAt = -Infinity;
  let minuteCount = 0;
  let encourageIndex = 0;
  let sessionRecordSec = 0;
  let halfRecordAnnounced = false;
  let matchRecordAnnounced = false;
  const ENCOURAGE_AFTER = 20;
  const CUE_INTERVAL = 15;

  function freeTick() {
    elapsed = Math.floor((Date.now() - startTime) / 1000);
    display.textContent = format(elapsed);
    const fraction = (elapsed % 60) / 60;
    setRingFraction(fraction, colorForElapsed(elapsed));

    const step = parseInt(intervalSelect.value, 10);
    const timeIsDue = elapsed > 0 && elapsed - lastAnnounced >= step;
    const cueIsDue = elapsed >= ENCOURAGE_AFTER && elapsed - lastCueAt >= CUE_INTERVAL;
    const minuteIsDue = elapsed >= (minuteCount + 1) * 60;

    // Adaptive coaching relative to personal record
    if (sessionRecordSec > 0 && !halfRecordAnnounced && elapsed >= Math.floor(sessionRecordSec / 2)) {
      halfRecordAnnounced = true;
      lastAnnounced = elapsed; lastCueAt = elapsed;
      speak('Je zit op de helft van je record! Kom op!');
      return;
    }
    if (sessionRecordSec > 0 && !matchRecordAnnounced && elapsed >= sessionRecordSec) {
      matchRecordAnnounced = true;
      lastAnnounced = elapsed; lastCueAt = elapsed;
      pulseFeedback(150);
      speak('Je evenaart je record! Ga ervoor!');
      return;
    }

    if (minuteIsDue) {
      minuteCount++;
      lastAnnounced = elapsed; lastCueAt = elapsed;
      pulseFeedback(200);
      playMilestoneChime();
      speak(numberToDutchWords(minuteCount) + (minuteCount === 1 ? ' minuut' : ' minuten'));
    } else if (cueIsDue) {
      lastCueAt = elapsed;
      if (timeIsDue) lastAnnounced = elapsed - (elapsed % step);
      const list = encouragementsByExercise[currentEx()] || encouragementsByExercise.plank;
      const cueText = list[encourageIndex % list.length];
      if (cueText === BREATHING_CUE) triggerBreathing();
      speak(cueText);
      encourageIndex++;
    } else if (timeIsDue) {
      lastAnnounced = elapsed - (elapsed % step);
      speak(numberToDutchWords(lastAnnounced) + ' seconden');
    }
  }

  async function startFree() {
    sessionRecordSec = await getRecord(currentEx());
    halfRecordAnnounced = false;
    matchRecordAnnounced = false;
    startTime = Date.now() - elapsed * 1000;
    lastAnnounced = elapsed - (elapsed % parseInt(intervalSelect.value, 10));
    timerId = setInterval(freeTick, 200);
  }
  function stopFree() { status.textContent = 'Gestopt op ' + format(elapsed); }
  async function resetFree() {
    breathingCircle.classList.remove('active');
    if (elapsed > 0) {
      const ex = currentEx();
      const finalElapsed = elapsed;
      saveSession(ex, finalElapsed);
      const { isNewRecord, improvement } = await checkRecord(ex, finalElapsed);
      let summary = (userName ? userName + ', j' : 'J') + 'e hield het ' + spokenDuration(finalElapsed) + ' vol!';
      if (isNewRecord) {
        summary += improvement > 0
          ? ' Nieuw record, ' + spokenDuration(improvement) + ' langer dan daarvoor!'
          : ' Dat is meteen je eerste record!';
      }
      speak(summary);
    }
    elapsed = 0; lastAnnounced = 0; lastCueAt = -Infinity; minuteCount = 0; encourageIndex = 0;
    display.textContent = '0:00';
    resetRing();
    status.textContent = '';
  }

  // ====== INTERVAL MODE ======
  let phase = 'work';
  let currentRound = 1;
  let phaseStartTime = null;
  let workSec = 30, restSec = 15, totalRounds = 3;
  let lastCountdownAt = null;

  function intervalTick() {
    const phaseElapsed = Math.floor((Date.now() - phaseStartTime) / 1000);
    const phaseDuration = phase === 'work' ? workSec : restSec;
    const remaining = Math.max(phaseDuration - phaseElapsed, 0);
    display.textContent = format(remaining);
    const fraction = phaseDuration > 0 ? phaseElapsed / phaseDuration : 0;
    const col = phase === 'work' ? colorForElapsed(phaseElapsed) : '#5a9edb';
    setRingFraction(Math.min(fraction, 1), col);
    phaseLabel.textContent = (phase === 'work' ? 'Werk' : 'Rust') + ' · Ronde ' + currentRound + ' van ' + totalRounds;

    if (remaining <= 3 && remaining >= 1 && lastCountdownAt !== remaining) {
      lastCountdownAt = remaining;
      speak(numberToDutchWords(remaining));
    }

    if (phaseElapsed >= phaseDuration) {
      if (phase === 'work') {
        if (currentRound >= totalRounds) {
          finishInterval();
          return;
        }
        phase = 'rest';
        phaseStartTime = Date.now();
        lastCountdownAt = null;
        pulseFeedback(120);
        speak('Rust.');
      } else {
        currentRound++;
        phase = 'work';
        phaseStartTime = Date.now();
        lastCountdownAt = null;
        pulseFeedback(150);
        speak('Ronde ' + numberToDutchWords(currentRound) + ', ga!');
      }
    }
  }

  function finishInterval() {
    clearInterval(timerId);
    timerId = null;
    releaseWakeLock();
    stopVoiceListening();
    pulseFeedback([120, 60, 120, 60, 250]);
    speak(userName ? 'Training voltooid, ' + userName + '! Goed gedaan!' : 'Training voltooid! Goed gedaan!');
    display.textContent = '0:00';
    phaseLabel.textContent = 'Klaar — ' + totalRounds + ' rondes voltooid';
    resetRing();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setControlsLockedForRun(false);
    status.textContent = '';
  }

  function startInterval() {
    workSec = parseInt(workSecSelect.value, 10);
    restSec = parseInt(restSecSelect.value, 10);
    totalRounds = parseInt(roundsSelect.value, 10);
    phase = 'work';
    currentRound = 1;
    phaseStartTime = Date.now();
    lastCountdownAt = null;
    speak('Start, ronde een!');
    timerId = setInterval(intervalTick, 200);
  }

  // ====== Controls lock helper ======
  function setControlsLockedForRun(locked) {
    intervalSelect.disabled = locked;
    workSecSelect.disabled = locked;
    restSecSelect.disabled = locked;
    roundsSelect.disabled = locked;
    exPrev.disabled = locked;
    exNext.disabled = locked;
    freeModeBtn.disabled = locked;
    intervalModeBtn.disabled = locked;
  }

  // ====== Start / Stop / Reset (shared) ======
  let countdownCancelled = false;
  async function runCountdown() {
    countdownCancelled = false;
    const seq = [['3', 'drie'], ['2', 'twee'], ['1', 'een']];
    for (const [digit, word] of seq) {
      if (countdownCancelled) return false;
      display.textContent = digit;
      playTick();
      speak(word);
      await new Promise((r) => setTimeout(r, 650));
    }
    if (countdownCancelled) return false;
    display.textContent = 'Start!';
    playTone(880, 0.18, 'sine', 0.2);
    speak(userName ? 'Kom op, ' + userName + '!' : 'Start!');
    await new Promise((r) => setTimeout(r, 350));
    return !countdownCancelled;
  }

  startBtn.addEventListener('click', async () => {
    await unlockAudio();
    requestWakeLock();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setControlsLockedForRun(true);
    shareBtn.style.display = 'none';
    status.textContent = '';
    const proceeded = await runCountdown();
    if (!proceeded) return;
    status.textContent = intervalMode ? '' : 'Loopt...';
    startVoiceListening();
    if (intervalMode) startInterval(); else startFree();
  });

  stopBtn.addEventListener('click', () => {
    countdownCancelled = true;
    clearInterval(timerId); timerId = null;
    window.speechSynthesis.cancel();
    audioPlayer.pause();
    releaseWakeLock();
    stopVoiceListening();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setControlsLockedForRun(false);
    if (intervalMode) { phaseLabel.textContent = 'Gepauzeerd'; }
    else stopFree();
  });

  resetBtn.addEventListener('click', () => {
    clearInterval(timerId); timerId = null;
    window.speechSynthesis.cancel();
    audioPlayer.pause();
    releaseWakeLock();
    stopVoiceListening();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setControlsLockedForRun(false);
    if (intervalMode) {
      phase = 'work'; currentRound = 1;
      display.textContent = '0:00';
      phaseLabel.textContent = '';
      resetRing();
      status.textContent = '';
    } else {
      resetFree();
    }
  });

  // ====== Init ======
  // ====== Init ======
  const splashScreen = document.getElementById('splashScreen');
  const splashTitle = document.getElementById('splashTitle');
  const splashSub = document.getElementById('splashSub');

  function hideSplash() { splashScreen.classList.add('hidden'); }
  splashScreen.addEventListener('click', () => {
    hideSplash();
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => playChime([392, 523.25], 0.16)).catch(() => {});
    } else {
      playChime([392, 523.25], 0.16);
    }
  });

  async function initApp() {
    renderExName();
    updateRecordDisplay();
    const list = await loadSessions();
    renderHistory(list);
    updateStreak(list);
    updateTodayOverview(list);
    renderHeatmap(list);

    splashTitle.textContent = userName ? 'Welkom terug, ' + userName + '!' : 'Trainingspartner';
    splashSub.textContent = streakDisplay.textContent || 'Klaar om te trainen?';
    setTimeout(hideSplash, 2200);
  }
  initApp();
</script>
</body>
</html>
