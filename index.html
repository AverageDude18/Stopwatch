<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingspartner">
<meta name="theme-color" content="#14171c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<title>Trainingspartner</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #14171c;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f2f2f2;
  }
  .card {
    text-align: center;
    padding: 32px 28px;
    width: min(90vw, 380px);
    position: relative;
  }

  /* Ring + time */
  .ring-wrap {
    position: relative;
    width: 230px;
    height: 230px;
    margin: 0 auto 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .progress-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    z-index: 2;
  }
  .ring-bg { fill: none; stroke: #24282f; stroke-width: 10; }
  .ring-fill {
    fill: none;
    stroke: #7fdba8;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.2s linear, stroke 0.4s ease;
  }
  .breathing-circle {
    position: absolute;
    top: 50%; left: 50%;
    width: 170px; height: 170px;
    margin: -85px 0 0 -85px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(127,219,168,0.35), rgba(127,219,168,0) 70%);
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }
  .breathing-circle.active { animation: breathe 8s ease-in-out; }
  @keyframes breathe {
    0%   { transform: scale(0.8);  opacity: 0; }
    15%  { opacity: 0.6; }
    50%  { transform: scale(1.18); opacity: 0.45; }
    85%  { opacity: 0.25; }
    100% { transform: scale(0.8);  opacity: 0; }
  }
  .time {
    position: relative;
    z-index: 3;
    font-size: 3.1rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #7fdba8;
    transition: color 0.4s ease;
  }

  .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  button {
    font-size: 1.05rem;
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.1s ease;
  }
  button:active { transform: scale(0.96); }
  #startBtn { background: #2e7d4f; color: white; }
  #stopBtn { background: #b3413a; color: white; }
  #resetBtn { background: #3a3f47; color: #f2f2f2; }
  #muteBtn { background: #3a3f47; color: #f2f2f2; padding: 14px 16px; font-size: 1.2rem; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .settings {
    margin-top: 18px;
    font-size: 0.9rem;
    color: #9aa0a8;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  select {
    background: #1f232b;
    color: #f2f2f2;
    border: 1px solid #3a3f47;
    border-radius: 6px;
    padding: 4px 8px;
  }
  .record-line {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #7fdba8;
    min-height: 1.2em;
  }
  .status { margin-top: 12px; font-size: 0.85rem; color: #6b7077; min-height: 1.2em; }

  .small-btn {
    background: #1f232b;
    color: #9aa0a8;
    font-size: 0.8rem;
    padding: 8px 14px;
    border: 1px solid #3a3f47;
  }
  .history {
    margin-top: 16px;
    text-align: left;
    background: #1a1d23;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #262a31;
    color: #d5d8dc;
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: #6b7077; }
  .history-empty { color: #6b7077; padding: 4px 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="ring-wrap">
      <svg class="progress-ring" viewBox="0 0 230 230">
        <circle class="ring-bg" cx="115" cy="115" r="100"></circle>
        <circle class="ring-fill" id="ringFill" cx="115" cy="115" r="100"></circle>
      </svg>
      <div class="breathing-circle" id="breathingCircle"></div>
      <div class="time" id="display">0:00</div>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="resetBtn">Reset</button>
      <button id="muteBtn" aria-label="Geluid aan/uit">🔊</button>
    </div>

    <div class="record-line" id="recordDisplay">Record: --</div>

    <div class="settings">
      Oefening
      <select id="exerciseSelect">
        <option value="plank">Plank</option>
        <option value="deadhang">Deadhang</option>
        <option value="lsit">L-sit deadhang</option>
      </select>
    </div>
    <div class="settings">
      Meld elke
      <select id="interval">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="30">30</option>
      </select>
      seconden
    </div>

    <div class="status" id="status">Stem laden...</div>

    <div class="controls" style="margin-top: 14px;">
      <button class="small-btn" id="historyToggle">Geschiedenis</button>
    </div>
    <div class="history" id="historySection" style="display:none;">
      <div id="historyList" class="history-empty">Nog geen sessies</div>
    </div>
  </div>

<script>
  // ====== CONFIG ======
  const ELEVEN_API_KEY = 'REDACTED_ELEVENLABS_KEY';
  const ELEVEN_MODEL = 'eleven_turbo_v2_5';
  const EX_NAMES = { plank: 'Plank', deadhang: 'Deadhang', lsit: 'L-sit deadhang' };

  // ====== State ======
  let startTime = null;
  let elapsed = 0;
  let timerId = null;
  let lastAnnounced = 0;
  let lastCueAt = -Infinity;
  let minuteCount = 0;
  let encourageIndex = 0;
  let elevenVoiceId = null;
  let elevenReady = false;
  let isMuted = false;
  let wakeLock = null;

  const ENCOURAGE_AFTER = 20;
  const CUE_INTERVAL = 15;
  const BREATHING_CUE = 'Rustig doorademen.';
  const encouragementsByExercise = {
    plank: [
      'Hou je rug mooi recht!',
      'Laat je heupen niet zakken!',
      'Span je buikspieren aan, jij kan dit!',
      BREATHING_CUE,
      'Nek ontspannen, kijk naar de grond.'
    ],
    deadhang: [
      'Schouders actief, niet helemaal hangen!',
      'Grip vasthouden, je doet het goed!',
      BREATHING_CUE,
      'Nek lekker los laten hangen.',
      'Kom op, nog even volhouden!'
    ],
    lsit: [
      'Houd die benen mooi hoog!',
      'Knieën strak, tenen gespannen!',
      'Core aanspannen, je zit er goed bij!',
      'Schouders naar beneden, weg bij je oren.',
      'Sterk blijven, nog even!'
    ]
  };

  // ====== Elements ======
  const display = document.getElementById('display');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');
  const muteBtn = document.getElementById('muteBtn');
  const intervalSelect = document.getElementById('interval');
  const exerciseSelect = document.getElementById('exerciseSelect');
  const status = document.getElementById('status');
  const ringFill = document.getElementById('ringFill');
  const breathingCircle = document.getElementById('breathingCircle');
  const recordDisplay = document.getElementById('recordDisplay');
  const historyToggle = document.getElementById('historyToggle');
  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');

  // ====== Ring setup ======
  const RING_R = 100;
  const RING_CIRC = 2 * Math.PI * RING_R;
  ringFill.style.strokeDasharray = RING_CIRC;
  ringFill.style.strokeDashoffset = RING_CIRC;

  function colorForElapsed(sec) {
    // Cool green early, shifts warmer (orange) the longer the hold goes, capped at 3 min.
    const t = Math.min(sec / 180, 1);
    const c1 = [127, 219, 168];
    const c2 = [255, 159, 92];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
    return `rgb(${r},${g},${b})`;
  }

  function updateRing() {
    const fraction = (elapsed % 60) / 60;
    ringFill.style.strokeDashoffset = RING_CIRC * (1 - fraction);
    const col = colorForElapsed(elapsed);
    ringFill.style.stroke = col;
    display.style.color = col;
  }

  function resetRing() {
    ringFill.style.strokeDashoffset = RING_CIRC;
    ringFill.style.stroke = '#7fdba8';
    display.style.color = '#7fdba8';
  }

  function triggerBreathing() {
    breathingCircle.classList.remove('active');
    void breathingCircle.offsetWidth; // force reflow so the animation restarts
    breathingCircle.classList.add('active');
  }

  // ====== Numbers to Dutch words ======
  function numberToDutchWords(n) {
    const ones = ['nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen',
                  'tien','elf','twaalf','dertien','veertien','vijftien','zestien',
                  'zeventien','achttien','negentien'];
    const tens = ['', '', 'twintig', 'dertig', 'veertig', 'vijftig', 'zestig', 'zeventig', 'tachtig', 'negentig'];
    if (n < 20) return ones[n];
    if (n < 100) {
      const t = Math.floor(n / 10);
      const o = n % 10;
      return o === 0 ? tens[t] : ones[o] + 'en' + tens[t];
    }
    const h = Math.floor(n / 100);
    const rest = n % 100;
    return (h > 1 ? ones[h] + 'honderd' : 'honderd') + (rest ? numberToDutchWords(rest) : '');
  }

  // ====== Mobile audio unlock ======
  const audioPlayer = new Audio();
  const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';

  function unlockAudio() {
    audioPlayer.src = SILENT_WAV;
    audioPlayer.play().catch(() => {});
    if ('speechSynthesis' in window) {
      const unlockUtter = new SpeechSynthesisUtterance(' ');
      unlockUtter.volume = 0;
      window.speechSynthesis.speak(unlockUtter);
    }
  }

  // ====== Haptics ======
  function vibrate(pattern) {
    if ('vibrate' in navigator) {
      try { navigator.vibrate(pattern); } catch (e) {}
    }
  }

  // ====== Wake lock (keeps the screen on during a hold) ======
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {
      // unsupported or denied — timer still works, screen may just sleep
    }
  }
  function releaseWakeLock() {
    if (wakeLock) {
      wakeLock.release().catch(() => {});
      wakeLock = null;
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !stopBtn.disabled) {
      requestWakeLock();
    }
  });

  // ====== Personal records & session history (persisted via window.storage) ======
  async function getRecord(ex) {
    try {
      const r = await window.storage.get('record:' + ex, false);
      return r && r.value ? parseInt(r.value, 10) : 0;
    } catch (e) {
      return 0;
    }
  }
  async function setRecord(ex, seconds) {
    try { await window.storage.set('record:' + ex, String(seconds), false); } catch (e) {}
  }
  async function updateRecordDisplay() {
    const rec = await getRecord(exerciseSelect.value);
    recordDisplay.textContent = rec > 0 ? 'Record: ' + format(rec) : 'Nog geen record';
  }

  async function loadSessions() {
    try {
      const r = await window.storage.get('sessions', false);
      return r && r.value ? JSON.parse(r.value) : [];
    } catch (e) {
      return [];
    }
  }
  async function saveSession(ex, dur) {
    try {
      const list = await loadSessions();
      list.unshift({ ex, dur, ts: Date.now() });
      const trimmed = list.slice(0, 20);
      await window.storage.set('sessions', JSON.stringify(trimmed), false);
      renderHistory(trimmed);
    } catch (e) {}
  }
  function renderHistory(list) {
    if (!list.length) {
      historyList.innerHTML = '<div class="history-empty">Nog geen sessies</div>';
      return;
    }
    historyList.innerHTML = list.slice(0, 6).map(s => {
      const d = new Date(s.ts);
      const dateStr = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
      return `<div class="history-item"><span>${EX_NAMES[s.ex] || s.ex}</span><span>${format(s.dur)} · ${dateStr}</span></div>`;
    }).join('');
  }

  async function checkRecord(ex, dur) {
    const rec = await getRecord(ex);
    if (dur > rec) {
      await setRecord(ex, dur);
      status.textContent = 'Nieuw record! 🎉 ' + format(dur);
      vibrate([100, 60, 100, 60, 200]);
      if (!isMuted) speak('Nieuw record! Geweldig gedaan!');
    }
    updateRecordDisplay();
  }

  historyToggle.addEventListener('click', () => {
    const showing = historySection.style.display !== 'none';
    historySection.style.display = showing ? 'none' : 'block';
    historyToggle.textContent = showing ? 'Geschiedenis' : 'Verberg geschiedenis';
  });

  exerciseSelect.addEventListener('change', updateRecordDisplay);

  // ====== Mute ======
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    muteBtn.textContent = isMuted ? '🔇' : '🔊';
    if (isMuted) {
      window.speechSynthesis.cancel();
      audioPlayer.pause();
    }
  });

  // ====== ElevenLabs setup ======
  async function initEleven() {
    try {
      const res = await fetch('https://api.elevenlabs.io/v1/voices', {
        headers: { 'xi-api-key': ELEVEN_API_KEY }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.voices && data.voices.length) {
        elevenVoiceId = data.voices[0].voice_id;
        elevenReady = true;
        status.textContent = '';
      } else {
        throw new Error('Geen stemmen gevonden');
      }
    } catch (e) {
      elevenReady = false;
      status.textContent = 'ElevenLabs fout: ' + (e && e.message ? e.message : e);
    }
  }
  initEleven();

  async function speakEleven(text) {
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + elevenVoiceId, {
      method: 'POST',
      headers: {
        'xi-api-key': ELEVEN_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text: text,
        model_id: ELEVEN_MODEL,
        language_code: 'nl',
        voice_settings: { stability: 0.72, similarity_boost: 0.75 }
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    audioPlayer.src = url;
    await audioPlayer.play();
  }

  function speakBrowser(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'nl-NL';
    utter.rate = 1;
    window.speechSynthesis.speak(utter);
  }

  async function speak(text) {
    if (isMuted) return;
    if (elevenReady) {
      try {
        await speakEleven(text);
        return;
      } catch (e) {
        // silently fall back to browser voice for this utterance
      }
    }
    speakBrowser(text);
  }

  // ====== Timer logic ======
  function format(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function tick() {
    elapsed = Math.floor((Date.now() - startTime) / 1000);
    display.textContent = format(elapsed);
    updateRing();

    const step = parseInt(intervalSelect.value, 10);
    const timeIsDue = elapsed > 0 && elapsed - lastAnnounced >= step;
    const cueIsDue = elapsed >= ENCOURAGE_AFTER && elapsed - lastCueAt >= CUE_INTERVAL;
    const minuteIsDue = elapsed >= (minuteCount + 1) * 60;

    if (minuteIsDue) {
      minuteCount++;
      lastAnnounced = elapsed;
      lastCueAt = elapsed;
      vibrate(200);
      speak(numberToDutchWords(minuteCount) + (minuteCount === 1 ? ' minuut' : ' minuten'));
    } else if (cueIsDue) {
      lastCueAt = elapsed;
      if (timeIsDue) lastAnnounced = elapsed - (elapsed % step);
      const list = encouragementsByExercise[exerciseSelect.value] || encouragementsByExercise.plank;
      const cueText = list[encourageIndex % list.length];
      if (cueText === BREATHING_CUE) triggerBreathing();
      speak(cueText);
      encourageIndex++;
    } else if (timeIsDue) {
      lastAnnounced = elapsed - (elapsed % step);
      speak(numberToDutchWords(lastAnnounced) + ' seconden');
    }
  }

  startBtn.addEventListener('click', () => {
    unlockAudio();
    requestWakeLock();
    speak('Start');
    startTime = Date.now() - elapsed * 1000;
    lastAnnounced = elapsed - (elapsed % parseInt(intervalSelect.value, 10));
    timerId = setInterval(tick, 200);
    startBtn.disabled = true;
    stopBtn.disabled = false;
    intervalSelect.disabled = true;
    exerciseSelect.disabled = true;
    status.textContent = 'Loopt...';
  });

  stopBtn.addEventListener('click', () => {
    clearInterval(timerId);
    window.speechSynthesis.cancel();
    audioPlayer.pause();
    releaseWakeLock();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    intervalSelect.disabled = false;
    exerciseSelect.disabled = false;
    status.textContent = 'Gestopt op ' + format(elapsed);
  });

  resetBtn.addEventListener('click', () => {
    clearInterval(timerId);
    window.speechSynthesis.cancel();
    audioPlayer.pause();
    releaseWakeLock();
    breathingCircle.classList.remove('active');

    if (elapsed > 0) {
      const ex = exerciseSelect.value;
      saveSession(ex, elapsed);
      checkRecord(ex, elapsed);
    }

    elapsed = 0;
    lastAnnounced = 0;
    lastCueAt = -Infinity;
    minuteCount = 0;
    encourageIndex = 0;
    display.textContent = '0:00';
    resetRing();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    intervalSelect.disabled = false;
    exerciseSelect.disabled = false;
    status.textContent = '';
  });

  // ====== Init ======
  updateRecordDisplay();
  loadSessions().then(renderHistory);
</script>
</body>
</html>
